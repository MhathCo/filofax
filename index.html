<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #bdc3c7; padding: 10px; margin: 0; }
        .binder { background: #2c3e50; padding: 10px; border-radius: 15px; max-width: 500px; margin: auto; }
        .tabs { display: flex; gap: 5px; }
        .tab { background: #34495e; color: white; padding: 10px; border-radius: 8px 8px 0 0; border: none; flex: 1; font-size: 14px; }
        .tab.active { background: white; color: black; font-weight: bold; }
        .page { background: white; min-height: 70vh; border-radius: 0 10px 10px 10px; padding: 20px; border-left: 15px solid #eee; }
        .content { display: none; }
        .content.active { display: block; }
        .app-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .tag { font-size: 10px; background: #e67e22; color: white; padding: 2px 5px; border-radius: 5px; }
    </style>
</head>
  <body>
<div class="binder">
    <div class="tabs">
        <button class="tab active" onclick="showTab(event, 'main')">Main</button>
        <button class="tab" onclick="showTab(event, 'apps')">Dev Stack</button>
    </div>
    <div class="page">
        <div id="main" class="content active">
            <h2>Filofax Dashboard</h2>
            <p>Welcome! Tap "Dev Stack" to see your apps.</p>
        </div>
        <div id="apps" class="content">
            <h2>My Dev Tools</h2>
            <div class="app-item"><b>Acode</b> <span class="tag">Editor</span><br>Writing the code I'm using now.</div>
            <div class="app-item"><b>Termux</b> <span class="tag">Terminal</span><br>Running scripts and servers.</div>
        </div>
    </div>
</div>
<script>
    function showTab(evt, id) {
        var i, content, tabs;
        content = document.getElementsByClassName("content");
        for (i = 0; i < content.length; i++) { content[i].style.display = "none"; }
        tabs = document.getElementsByClassName("tab");
        for (i = 0; i < tabs.length; i++) { tabs[i].className = tabs[i].className.replace(" active", ""); }
        document.getElementById(id).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>
</body>
</html>
