<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #bdc3c7; padding: 10px; margin: 0; }
        .binder { background: #2c3e50; padding: 10px; border-radius: 15px; max-width: 500px; margin: auto; }
        .tabs { display: flex; gap: 5px; }
        .tab { background: #34495e; color: white; padding: 10px; border-radius: 8px 8px 0 0; border: none; flex: 1; font-size: 14px; }
        .tab.active { background: white; color: black; font-weight: bold; }
        .page { background: white; min-height: 70vh; border-radius: 0 10px 10px 10px; padding: 20px; border-left: 15px solid #eee; }
        .content { display: none; }
        .content.active { display: block; }
        /* The Writable Area */
        #note-pad { 
            width: 100%; 
            min-height: 300px; 
            border: none; 
            outline: none; 
            background: repeating-linear-gradient(white, white 24px, #e8e8e8 25px);
            line-height: 25px;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="binder">
    <div class="tabs">
        <button class="tab active" onclick="showTab(event, 'main')">Home</button>
        <button class="tab" onclick="showTab(event, 'notes')">Journal</button>
    </div>
    <div class="page">
        <div id="main" class="content active">
            <h2>Filofax</h2>
            <p>Tap the <b>Journal</b> tab to start writing!</p>
        </div>
        <div id="notes" class="content">
            <h2>Daily Notes</h2>
            <div id="note-pad" contenteditable="true" oninput="saveNotes()">
                Tap here to type...
            </div>
            <p style="font-size: 10px; color: gray;">(Auto-saves to this device)</p>
        </div>
    </div>
</div>

<script>
    function showTab(evt, id) {
        var i, content, tabs;
        content = document.getElementsByClassName("content");
        for (i = 0; i < content.length; i++) { content[i].style.display = "none"; }
        tabs = document.getElementsByClassName("tab");
        for (i = 0; i < tabs.length; i++) { tabs[i].className = tabs[i].className.replace(" active", ""); }
        document.getElementById(id).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // SAVE & LOAD LOGIC
    function saveNotes() {
        const text = document.getElementById('note-pad').innerHTML;
        localStorage.setItem('filofax_notes', text);
    }

    window.onload = function() {
        const savedText = localStorage.getItem('filofax_notes');
        if (savedText) {
            document.getElementById('note-pad').innerHTML = savedText;
        }
    };
</script>
</body>
</html>
